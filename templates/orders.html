{% extends "layout.html" %}

{% block title %}
    Home
{% endblock %}

{% block main %}
    <div class="container" style="max-width: 1000px; justify-content: center">
        <div class="row">
            {%for order in orders%}
            <div class="col-sm-4">
                <div class="card">
                    <div class="card-body p-4 mb-4 text-start ">
                        <h5 class="card-title ">Order ID: {{order['orderId']}}</h5>
                        <p class="card-text">Name: {{order['orderName']}}</p>
                        <p class="card-text">Product: {{order['name']}}</p>
                        <p class="card-text">Order Date: {{order["orderDate"]}}</p>
                        <form action="/orders" method="post">
                            <input type="hidden" name="orderId" value="{{order['orderId']}}">
                            <div class="text-center">
                                <button class="btn btn-primary w-100">Fulfill</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            {%endfor%}
        </div>
    </div>
{% endblock %}
