{% extends "layout.html" %}

{% block title %}
    Home
{% endblock %}

{% block main %}
    <div class="container" style="max-width: 500px">
        <div class="card">
            <div class="card-body text-start p-5">
                <div class="card-title">
                    <h5>Pay now</h5>
                </div>
                <form action="/buy/{{id}}" method="POST">
                    <div class="form-group py-2">
                        <label for="name" class="">Full Name</label>
                        <input type="text" class="form-control" id="name" name="name">
                    </div>
                    <div class="form-group py-2">
                        <label for="address">Address</label>
                        <input type="text" class="form-control" id="address" name="address">
                    </div>
                    <div class="form-group py-2">
                        <label for="cardNumber">Card Number</label>
                        <input type="text" class="form-control" id="cardNumber" name="cardNumber">
                    </div>
                    <div class="form-group py-2">
                        <label for="CCV">CCV</label>
                        <input type="text" class="form-control" id="CCV" name="CCV">
                    </div>
                    <div class="form-group py-2">
                        <label for="expiry">Expiry</label>
                        <input type="date" class="form-control" id="expiry" name="expiry">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-fill">Submit</button>
                        <a href="/view/{{id}}" class="btn btn-primary flex-fill">Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
