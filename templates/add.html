{% extends "layout.html" %}

{% block title %}
    Home
{% endblock %}

{% block main %}
    <div class="container" style="max-width: 500px">
        <div class="card">
            <div class="card-body text-start p-5">
                <div class="card-title">
                    <h5>Add Product</h5>
                </div>
                <form action="/add" method="POST">
                    <div class="form-group py-2">
                        <label for="name" class="">Name</label>
                        <input type="text" class="form-control" id="name" name="name">
                    </div>
                    <div class="form-group py-2">
                        <label for="category">Category</label>
                        <input type="text" class="form-control" id="category" name="category">
                    </div>
                    <div class="form-group py-2">
                        <label for="description">Description</label>
                        <input type="text" class="form-control" id="description" name="description">
                    </div>
                    <div class="form-group py-2">
                        <label for="salePrice">Price</label>
                        <input type="text" class="form-control" id="salePrice" name="salePrice">
                    </div>
                    <div class="form-group py-2">
                        <label for="restockPrice">Restock Price</label>
                        <input type="text" class="form-control" id="restockPrice" name="restockPrice">
                    </div>
                    <div class="form-group py-2">
                        <label for="restockURL">Restock URL</label>
                        <input type="text" class="form-control" id="restockURL" name="restockURL">
                    </div>
                    <div class="form-group py-2">
                        <label for="inStock">Innital Stock</label>
                        <input type="number" class="form-control" id="inStock" name="inStock">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-fill">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
