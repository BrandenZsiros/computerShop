{% extends "layout.html" %}

{% block title %}
    Home
{% endblock %}

{% block main %}
    <div class="container" style="max-width: 1000px; justify-content: center">
        <div class="row">
            {%for product in products%}
            <div class="col-sm-4 mb-4">
                <div class="card">
                    <div class="card-body p-4 text-start ">
                        <h5 class="card-title ">{{product['name']}}</h5>
                        <p class="card-text">Quanity: {{product['instock']}}</p>
                        <p class="card-text">Restock Price: {{product['restockPrice']}}</p>
                        <form action="/restock" method="post">
                            <input type="hidden" name="productID" value="{{product['productID']}}">
                            <div class="text-center">
                                <button class="btn btn-primary w-100">Restock</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            {%endfor%}
        </div>
    </div>
{% endblock %}
